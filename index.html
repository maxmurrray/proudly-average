<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proudly Average</title>
    <link rel="stylesheet" href="https://use.typekit.net/wfh3dbx.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">

        <main>
            <h1>Stay in the loop!</h1>
            <div class="form-wrapper">
                <form class="signup-form" id="signupForm">
                    <input type="tel" placeholder="Phone number...">
                    <div class="btn-group">
                        <button type="submit" id="submitBtn">Submit</button>
                        <a href="/privacy.html" class="privacy-link">Privacy Policy</a>
                    </div>
                </form>
            </div>
        </main>

        <div class="logo-bottom" id="eyesLogo">
            <img src="eyes.svg" alt="Proudly Average">
        </div>
        <span class="logo-word logo-word-left">PROUDLY</span>
        <span class="logo-word logo-word-right">AVERAGE</span>

        <!-- Easter egg — hidden under the eyes, no hints given -->
        <div class="easter-egg" id="easterEgg">use code '<strong>sloth</strong>' for 7.8% off</div>

    </div>
    <script>
        /* ── Submit: simple press + "Sent." ─────────────────────── */
        (function () {
            var btn  = document.getElementById('submitBtn');
            var done = false;

            document.getElementById('signupForm').addEventListener('submit', function (e) {
                e.preventDefault();
                if (done) return;
                done = true;
                btn.classList.add('pressed');
                setTimeout(function () { btn.textContent = 'Sent.'; }, 80);
            });
        })();

        /* ── Easter egg: draggable eyes, message hidden underneath ── */
        (function () {
            var logo = document.getElementById('eyesLogo');
            var msg  = document.getElementById('easterEgg');

            var dragging    = false;
            var revealed    = false;
            var dragEnabled = false;
            var startX = 0, startY = 0;
            var savedX = 0, savedY = 0;
            var currentX = 0, currentY = 0;

            function enableDrag() {
                if (dragEnabled) return;
                dragEnabled = true;
                logo.style.animation        = 'none';
                logo.style.transform        = 'translate3d(0,0,0)';
                logo.style.cursor           = 'grab';
                logo.style.touchAction      = 'none';
                logo.style.userSelect       = 'none';
                logo.style.webkitUserSelect = 'none';
            }

            logo.addEventListener('animationend', function (e) {
                if (e.animationName === 'eyes-rise') enableDrag();
            });
            setTimeout(enableDrag, 1100);

            function getClient(e) {
                var src = e.touches ? e.touches[0] : e;
                return { x: src.clientX, y: src.clientY };
            }

            function onDown(e) {
                if (!dragEnabled) return;
                e.preventDefault();
                dragging = true;
                var pt = getClient(e);
                startX = pt.x - savedX;
                startY = pt.y - savedY;
                logo.style.cursor     = 'grabbing';
                logo.style.zIndex     = '5';
                logo.style.transition = 'none';
                window.addEventListener('mousemove', onMove);
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('mouseup',   onUp);
                window.addEventListener('touchend',  onUp);
            }

            function onMove(e) {
                if (!dragging) return;
                e.preventDefault();
                var pt = getClient(e);
                currentX = pt.x - startX;
                currentY = pt.y - startY;
                logo.style.transform = 'translate3d(' + currentX + 'px,' + currentY + 'px,0)';
                if (!revealed && Math.sqrt(currentX * currentX + currentY * currentY) > 40) {
                    revealed = true;
                    msg.classList.add('visible');
                }
            }

            function onUp() {
                if (!dragging) return;
                dragging = false;
                savedX = currentX;
                savedY = currentY;
                logo.style.cursor = 'grab';
                logo.style.zIndex = '1';
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('mouseup',   onUp);
                window.removeEventListener('touchend',  onUp);
            }

            logo.addEventListener('mousedown',  onDown);
            logo.addEventListener('touchstart', onDown, { passive: false });
        })();
    </script>
</body>
</html>
