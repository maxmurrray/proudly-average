<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proudly Average</title>
    <link rel="stylesheet" href="https://use.typekit.net/wfh3dbx.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">

        <main>
            <h1>Stay in the loop!</h1>
            <div class="form-wrapper">
                <form class="signup-form" id="signupForm">
                    <input type="tel" placeholder="Phone number...">
                    <div class="btn-group">
                        <div class="btn-flip-root" id="submitFlip">
                            <div class="btn-flip-inner">
                                <button type="submit" class="btn-face btn-face-front">
                                    <span class="fill-bar"></span>
                                    <span class="btn-text">Submit</span>
                                </button>
                                <button type="submit" class="btn-face btn-face-back">SAVE15</button>
                            </div>
                            <!-- Checkmark lives outside the flip inner — not affected by its opacity/transform -->
                            <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path class="check-path" d="M4 12 L9 17 L20 7" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <a href="/privacy.html" class="privacy-link">Privacy Policy</a>
                    </div>
                </form>
            </div>
        </main>

        <div class="logo-bottom" id="eyesLogo">
            <img src="eyes.svg" alt="Proudly Average">
        </div>
        <span class="logo-word logo-word-left">PROUDLY</span>
        <span class="logo-word logo-word-right">AVERAGE</span>

        <!-- Easter egg — hidden under the eyes, no hints given -->
        <div class="easter-egg" id="easterEgg">use code '<strong>sloth</strong>' for 7.8% off</div>

    </div>
    <script>
        (function () {
            var flipRoot  = document.getElementById('submitFlip');
            var flipInner = flipRoot.querySelector('.btn-flip-inner');
            var checkIcon = flipRoot.querySelector('.check-icon');
            var checkPath = flipRoot.querySelector('.check-path');
            var timer     = null;
            var submitted = false;

            /* ── Promo flip: desktop hover only ────────────────────── */
            if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
                flipRoot.addEventListener('mouseenter', function () {
                    if (submitted) return;
                    timer = setTimeout(function () {
                        flipInner.classList.add('is-flipped');
                    }, 1500);
                });
                flipRoot.addEventListener('mouseleave', function () {
                    clearTimeout(timer); timer = null;
                });
            }

            /* ── Submit: bubble pop → vanish → green checkmark draws ─ */
            document.getElementById('signupForm').addEventListener('submit', function (e) {
                e.preventDefault();
                if (submitted) return;
                submitted = true;
                clearTimeout(timer);

                // Step 1 — BUBBLE: inflate the flip inner
                flipInner.style.transition = 'transform 0.1s ease-out';
                flipInner.style.transform  = 'scale(1.12)';

                setTimeout(function () {
                    // Step 2 — POP: shrink and vanish (bubble bursts)
                    flipInner.style.transition = 'transform 0.18s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.18s ease-in';
                    flipInner.style.transform  = 'scale(0.3)';
                    flipInner.style.opacity    = '0';

                    setTimeout(function () {
                        // Step 3 — DRAW: green checkmark appears and traces itself
                        var len = checkPath.getTotalLength ? checkPath.getTotalLength() : 22;
                        checkPath.style.strokeDasharray  = len;
                        checkPath.style.strokeDashoffset = len;
                        checkIcon.style.display = 'block';
                        void checkIcon.offsetWidth; // force reflow so transition fires
                        checkPath.style.transition       = 'stroke-dashoffset 0.5s cubic-bezier(0.2, 0.8, 0.4, 1)';
                        checkPath.style.strokeDashoffset = '0';
                    }, 180);

                }, 100);
            });

        })();

        /* ── Easter egg: draggable eyes, message hidden underneath ── */
        (function () {
            var logo = document.getElementById('eyesLogo');
            var msg  = document.getElementById('easterEgg');

            var dragging  = false;
            var revealed  = false;
            var startX    = 0, startY    = 0;
            var savedX    = 0, savedY    = 0;
            var currentX  = 0, currentY  = 0;

            // Wait for the rise animation to finish before enabling drag
            logo.addEventListener('animationend', function (e) {
                if (e.animationName !== 'eyes-rise') return;
                logo.style.animation  = 'none';
                logo.style.transform  = 'translate3d(0, 0, 0)';
                logo.style.cursor     = 'grab';
                logo.style.touchAction = 'none';
                attachDrag();
            });

            function getClient(e) {
                return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                                 : { x: e.clientX,            y: e.clientY };
            }

            function attachDrag() {
                logo.addEventListener('mousedown',  onDown);
                logo.addEventListener('touchstart', onDown, { passive: false });
            }

            function onDown(e) {
                e.preventDefault();
                dragging = true;
                var pt = getClient(e);
                startX = pt.x - savedX;
                startY = pt.y - savedY;
                logo.style.cursor  = 'grabbing';
                logo.style.zIndex  = '5';
                logo.style.transition = 'none';

                window.addEventListener('mousemove',  onMove);
                window.addEventListener('touchmove',  onMove, { passive: false });
                window.addEventListener('mouseup',    onUp);
                window.addEventListener('touchend',   onUp);
            }

            function onMove(e) {
                if (!dragging) return;
                e.preventDefault();
                var pt = getClient(e);
                currentX = pt.x - startX;
                currentY = pt.y - startY;
                logo.style.transform = 'translate3d(' + currentX + 'px, ' + currentY + 'px, 0)';

                // Reveal message once eyes have moved far enough
                if (!revealed && Math.sqrt(currentX * currentX + currentY * currentY) > 40) {
                    revealed = true;
                    msg.classList.add('visible');
                }
            }

            function onUp() {
                if (!dragging) return;
                dragging = false;
                savedX = currentX;
                savedY = currentY;
                logo.style.cursor = 'grab';
                logo.style.zIndex = '1';

                window.removeEventListener('mousemove',  onMove);
                window.removeEventListener('touchmove',  onMove);
                window.removeEventListener('mouseup',    onUp);
                window.removeEventListener('touchend',   onUp);
            }
        })();
    </script>
</body>
</html>
