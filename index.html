<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proudly Average</title>
    <link rel="stylesheet" href="https://use.typekit.net/wfh3dbx.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">

        <main>
            <h1>Stay in the loop!</h1>
            <div class="form-wrapper">
                <form class="signup-form" onsubmit="return false;">
                    <input type="tel" placeholder="Phone number...">
                    <div class="btn-group">
                        <div class="btn-flip-root" id="submitFlip">
                            <div class="btn-flip-inner">
                                <button type="submit" class="btn-face btn-face-front">
                                    <span class="fill-bar"></span>
                                    <span class="btn-text">Submit</span>
                                </button>
                                <button type="submit" class="btn-face btn-face-back">SAVE15</button>
                            </div>
                        </div>
                        <a href="#" class="privacy-link">Privacy Policy</a>
                    </div>
                </form>
            </div>
        </main>

        <div class="logo-bottom">
            <img src="eyes.svg" alt="Proudly Average">
        </div>
        <span class="logo-word logo-word-left">PROUDLY</span>
        <span class="logo-word logo-word-right">AVERAGE</span>

    </div>
    <script>
        (function () {
            // Only run the flip interaction on desktop (real hover/mouse devices)
            if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

            var root  = document.getElementById('submitFlip');
            var inner = root.querySelector('.btn-flip-inner');
            var timer = null;

            root.addEventListener('mouseenter', function () {
                timer = setTimeout(function () {
                    inner.classList.add('is-flipped');
                }, 1500);
            });

            root.addEventListener('mouseleave', function () {
                clearTimeout(timer);
                timer = null;
            });
        })();
    </script>
</body>
</html>
